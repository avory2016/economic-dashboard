<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Macro Research Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#0f0f17;--bg3:#14141e;--bg4:#1a1a26;
  --border:#1e1e2e;--border2:#252538;
  --accent:#00CC99;--accent2:rgba(0,204,153,0.12);
  --text:#e8e8f2;--muted:#5a5a7a;--muted2:#8888aa;
  --up:#00CC99;--down:#ff4d6d;--flat:#6666aa;
  --c-jobs:#00CC99;--c-consumer:#4da6ff;--c-stress:#ff7b54;--c-sentiment:#c77dff;--c-housing:#f9c74f;
  --c-macro:#00b4d8;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* ── NAV ── */
nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;}
.nav-logo{display:flex;align-items:center;gap:10px}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 2.5s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-title{font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
.nav-tabs{display:flex;gap:2px}
.nav-tab{background:transparent;border:none;padding:8px 18px;color:var(--muted2);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:4px;transition:all .2s;}
.nav-tab:hover{color:var(--text);background:var(--bg3)}
.nav-tab.active{color:var(--accent);background:var(--accent2)}
.nav-right{display:flex;align-items:center;gap:10px}
#nav-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.btn{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:5px 14px;border-radius:3px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn:hover{background:var(--accent);color:#000}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-danger{border-color:var(--down);color:var(--down)}
.btn-danger:hover{background:var(--down);color:#fff}

#prog{position:fixed;top:0;left:0;height:2px;width:0;background:var(--accent);z-index:9999;transition:width .3s}

/* ── SECTIONS ── */
.section{display:none;padding:24px 32px;max-width:1600px;margin:0 auto}
.section.active{display:block}

/* ── FRED STRIP ── */
.fred-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:22px;scrollbar-width:none;}
.fred-strip::-webkit-scrollbar{display:none}
.fcard{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:11px 14px;min-width:140px;flex-shrink:0;cursor:default;}
.fcard-label{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.fcard-val{font-size:17px;font-weight:700;line-height:1;font-family:'JetBrains Mono',monospace}
.fcard-val.up{color:var(--up)}.fcard-val.down{color:var(--down)}.fcard-val.flat{color:var(--muted2)}
.fcard-sub{font-size:9px;margin-top:2px;font-family:'JetBrains Mono',monospace}
.fcard-sub.up{color:var(--up)}.fcard-sub.down{color:var(--down)}.fcard-sub.flat{color:var(--muted2)}
.fcard-date{font-size:8px;color:var(--muted);margin-top:3px;font-family:'JetBrains Mono',monospace}

/* ── INDEX CARDS ── */
.index-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.icard{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 16px;cursor:pointer;transition:all .2s;}
.icard:hover,.icard.active{background:var(--bg3)}
.icard[data-cat=jobs].active{border-color:var(--c-jobs)}
.icard[data-cat=consumer_spending].active{border-color:var(--c-consumer)}
.icard[data-cat=financial_stress].active{border-color:var(--c-stress)}
.icard[data-cat=economic_sentiment].active{border-color:var(--c-sentiment)}
.icard[data-cat=housing].active{border-color:var(--c-housing)}
.icard-label{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.icard-score{font-size:28px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace}
.icard[data-cat=jobs] .icard-score{color:var(--c-jobs)}
.icard[data-cat=consumer_spending] .icard-score{color:var(--c-consumer)}
.icard[data-cat=financial_stress] .icard-score{color:var(--c-stress)}
.icard[data-cat=economic_sentiment] .icard-score{color:var(--c-sentiment)}
.icard[data-cat=housing] .icard-score{color:var(--c-housing)}
.icard-sub{font-size:9px;color:var(--muted);margin-top:3px}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;padding:9px 20px;color:var(--muted2);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-bottom:-1px;transition:all .2s;}
.tab:hover{color:var(--text)}
.tab[data-cat=jobs].active{border-color:var(--c-jobs);color:var(--c-jobs)}
.tab[data-cat=consumer_spending].active{border-color:var(--c-consumer);color:var(--c-consumer)}
.tab[data-cat=financial_stress].active{border-color:var(--c-stress);color:var(--c-stress)}
.tab[data-cat=economic_sentiment].active{border-color:var(--c-sentiment);color:var(--c-sentiment)}
.tab[data-cat=housing].active{border-color:var(--c-housing);color:var(--c-housing)}
.panel{display:none}.panel.active{display:block}

/* ── TIMEFRAME ── */
.tf-row{display:flex;align-items:center;gap:4px;margin-bottom:14px;flex-wrap:wrap;}
.tf-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-right:4px}
.tf-btn{background:transparent;border:1px solid var(--border2);color:var(--muted2);padding:3px 9px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s;}
.tf-btn:hover{border-color:var(--muted2);color:var(--text)}
.tf-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,204,153,.08)}
.latest-lbl{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-left:auto}

/* ── CHART BOX ── */
.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:20px 22px;margin-bottom:14px;}
.box-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.box-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2)}
.box-title span{color:var(--text);font-size:13px;text-transform:none;letter-spacing:0;margin-left:8px}
.chart-h{position:relative;height:200px}

/* ── TERM GRID ── */
.term-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 16px;}
.tcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px}
.tcard-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.3}
.tcard-date{font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px}
.badge{font-size:8px;font-weight:700;padding:3px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.badge.up{background:rgba(0,204,153,.12);color:var(--up)}
.badge.down{background:rgba(255,77,109,.12);color:var(--down)}
.badge.flat{background:rgba(102,102,170,.12);color:var(--flat)}
.tcard-stats{display:flex;gap:16px;margin-bottom:9px}
.stat-val{font-size:20px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace}
.stat-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.mini-h{height:42px}

/* ── MACRO SECTION ── */
.macro-group{margin-bottom:28px}
.macro-group-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted2);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.macro-group-title::after{content:'';flex:1;height:1px;background:var(--border)}
.macro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.mcard{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 16px;}
.mcard-label{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.mcard-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.mcard-val.up{color:var(--up)}.mcard-val.down{color:var(--down)}.mcard-val.flat{color:var(--muted2)}
.mcard-sub{font-size:9px;margin-top:2px;font-family:'JetBrains Mono',monospace}
.mcard-sub.up{color:var(--up)}.mcard-sub.down{color:var(--down)}.mcard-sub.flat{color:var(--muted2)}
.mcard-date{font-size:8px;color:var(--muted);margin-top:3px;font-family:'JetBrains Mono',monospace}
.mcard-spark{height:36px;margin-top:8px}

/* ── WATCHLIST ── */
.wl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.page-title{font-size:18px;font-weight:800;letter-spacing:.05em}
.page-subtitle{font-size:11px;color:var(--muted2);margin-top:2px}
.wl-table{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.wl-table th{padding:10px 14px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);text-align:left;border-bottom:1px solid var(--border);background:var(--bg3)}
.wl-table td{padding:12px 14px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:top}
.wl-table tr:last-child td{border-bottom:none}
.wl-table tr:hover td{background:var(--bg3)}
.ticker-badge{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--accent)}
.price-val{font-family:'JetBrains Mono',monospace;font-weight:600}
.chg-up{color:var(--up);font-family:'JetBrains Mono',monospace;font-size:11px}
.chg-down{color:var(--down);font-family:'JetBrains Mono',monospace;font-size:11px}
.thesis-text{font-size:11px;color:var(--muted2);max-width:300px;line-height:1.4}
.tag{display:inline-block;background:var(--bg4);border:1px solid var(--border2);border-radius:3px;padding:2px 7px;font-size:9px;color:var(--muted2);margin:1px}
.empty-state{text-align:center;padding:60px;color:var(--muted)}
.empty-state .es-icon{font-size:36px;margin-bottom:12px;opacity:.3}
.empty-state .es-text{font-size:13px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:28px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:20px;color:var(--accent)}
.form-group{margin-bottom:14px}
.form-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted2);margin-bottom:5px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:9px 12px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--muted)}
textarea.form-input{resize:vertical;min-height:80px;font-family:'Syne',sans-serif;font-size:12px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* ── PORTFOLIO ── */
.port-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.psum-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 16px;}
.psum-label{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.psum-val{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace}
.psum-val.up{color:var(--up)}.psum-val.down{color:var(--down)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@media(max-width:900px){
  .section{padding:16px}nav{padding:0 16px}
  .index-row{grid-template-columns:repeat(2,1fr)}
  .port-summary{grid-template-columns:repeat(2,1fr)}
  nav .nav-tabs{display:none}
}
</style>
</head>
<body>
<div id="prog"></div>

<nav>
  <div class="nav-logo">
    <div class="pulse-dot"></div>
    <div class="nav-title">Macro Research</div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-section="macro" onclick="switchSection('macro')">Macro</button>
    <button class="nav-tab" data-section="signals" onclick="switchSection('signals')">Signals</button>
    <button class="nav-tab" data-section="watchlist" onclick="switchSection('watchlist')">Watchlist</button>
    <button class="nav-tab" data-section="portfolio" onclick="switchSection('portfolio')">Portfolio</button>
  </div>
  <div class="nav-right">
    <span id="nav-time"></span>
    <button class="btn btn-sm" onclick="refreshAll()">↻ Refresh</button>
  </div>
</nav>

<!-- ══════════════ MACRO ══════════════ -->
<div class="section active" id="sec-macro">
  <div class="fred-strip" id="fred-strip"></div>
  <div id="macro-groups"></div>
</div>

<!-- ══════════════ SIGNALS ══════════════ -->
<div class="section" id="sec-signals">
  <div class="fred-strip" id="fred-strip2"></div>
  <div class="index-row" id="index-row"></div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

<!-- ══════════════ WATCHLIST ══════════════ -->
<div class="section" id="sec-watchlist">
  <div class="wl-header">
    <div>
      <div class="page-title">Watchlist</div>
      <div class="page-subtitle">Track tickers with thesis & live prices</div>
    </div>
    <button class="btn" onclick="openModal('watchlist')">+ Add Ticker</button>
  </div>
  <div id="wl-content"></div>
</div>

<!-- ══════════════ PORTFOLIO ══════════════ -->
<div class="section" id="sec-portfolio">
  <div class="wl-header">
    <div>
      <div class="page-title">Portfolio</div>
      <div class="page-subtitle">Positions, cost basis & P&L</div>
    </div>
    <button class="btn" onclick="openModal('portfolio')">+ Add Position</button>
  </div>
  <div class="port-summary" id="port-summary"></div>
  <div id="port-content"></div>
</div>

<!-- ══════════════ MODALS ══════════════ -->
<div class="modal-overlay" id="modal-watchlist">
  <div class="modal">
    <div class="modal-title">Add to Watchlist</div>
    <div class="form-group">
      <label class="form-label">Ticker Symbol</label>
      <input class="form-input" id="wl-ticker" placeholder="e.g. AAPL" style="text-transform:uppercase">
    </div>
    <div class="form-group">
      <label class="form-label">Company Name</label>
      <input class="form-input" id="wl-name" placeholder="e.g. Apple Inc.">
    </div>
    <div class="form-group">
      <label class="form-label">Investment Thesis</label>
      <textarea class="form-input" id="wl-thesis" placeholder="Why are you watching this..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Target Price</label>
        <input class="form-input" id="wl-target" type="number" placeholder="0.00">
      </div>
      <div class="form-group">
        <label class="form-label">Tags (comma separated)</label>
        <input class="form-input" id="wl-tags" placeholder="e.g. tech, AI, growth">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="closeModal('watchlist')">Cancel</button>
      <button class="btn" onclick="saveWatchlist()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-portfolio">
  <div class="modal">
    <div class="modal-title">Add Position</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Ticker Symbol</label>
        <input class="form-input" id="pt-ticker" placeholder="e.g. MSFT" style="text-transform:uppercase">
      </div>
      <div class="form-group">
        <label class="form-label">Company Name</label>
        <input class="form-input" id="pt-name" placeholder="e.g. Microsoft">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Shares</label>
        <input class="form-input" id="pt-shares" type="number" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">Cost Basis (per share)</label>
        <input class="form-input" id="pt-cost" type="number" placeholder="0.00">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Open Date</label>
      <input class="form-input" id="pt-date" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-input" id="pt-notes" placeholder="Position notes..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="closeModal('portfolio')">Cancel</button>
      <button class="btn" onclick="savePortfolio()">Save</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
const SUPABASE_URL = 'https://tsmgpgdsynqlubimxopz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fjpS2vPBDVYlYDrBMrlaaA_wZM-HssZ';
const TD_KEY       = 'a09cecd086f94872b4e8ca25358b41da';

const CAT_ORDER  = ['jobs','consumer_spending','financial_stress','economic_sentiment','housing'];
const FRED_ORDER = ['ICSA','UNRATE','CPIAUCSL','UMCSENT','MORTGAGE30US','HOUST','RSAFS','DRCCLACBS','BAMLH0A0HYM2','BAMLC0A0CM','T10Y2Y','BUSAPPWNSATOT'];
const FRED_BAD_UP = new Set(['ICSA','UNRATE','CPIAUCSL','DRCCLACBS','BAMLH0A0HYM2','BAMLC0A0CM']);
const TF_OPTIONS = [
  {key:'30d',label:'30D',days:30},{key:'90d',label:'90D',days:90},
  {key:'1y',label:'1Y',days:365},{key:'3y',label:'3Y',days:1095},
  {key:'5y',label:'5Y',days:1825},{key:'max',label:'MAX',days:99999},
];

const MACRO_GROUPS = {
  'Labor': ['ICSA','UNRATE'],
  'Inflation': ['CPIAUCSL','UMCSENT'],
  'Credit & Spreads': ['BAMLH0A0HYM2','BAMLC0A0CM','T10Y2Y','DRCCLACBS'],
  'Business': ['BUSAPPWNSATOT'],
  'Housing': ['MORTGAGE30US','HOUST'],
  'Consumer': ['RSAFS'],
};

let MACRO_DATA = null, activeCat = 'jobs', activeTF = '90d';
const miniCharts = {}, mainCharts = {}, sparkCharts = {};

/* ════════════════════════════════════════
   UTILS
════════════════════════════════════════ */
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`}

function parseDate(s){
  if(!s)return null;
  s=String(s).trim();
  if(s.includes('–'))s=s.split('–')[0].trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return new Date(s+'T00:00:00');
  const d=new Date(s);return isNaN(d.getTime())?null:d;
}
function fmt(s){const d=parseDate(s);if(!d)return '';return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtShort(s){const d=parseDate(s);if(!d)return '';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function filterTF(dates,vals,tfKey){
  const tf=TF_OPTIONS.find(t=>t.key===tfKey);
  if(!tf||tf.days>=99999)return{dates,vals};
  const cutoff=new Date(Date.now()-tf.days*86400000);
  const od=[],ov=[];
  dates.forEach((d,i)=>{const pd=parseDate(d);if(pd&&pd>=cutoff){od.push(d);ov.push(vals[i]);}});
  return od.length>=3?{dates:od,vals:ov}:{dates,vals};
}
function thin(dates,vals,n=80){
  if(dates.length<=n)return{dates,vals};
  const step=Math.ceil(dates.length/n),od=[],ov=[];
  for(let i=0;i<dates.length;i+=step){od.push(dates[i]);ov.push(vals[i]);}
  return{dates:od,vals:ov};
}
function fmtFredVal(sid,v){
  if(sid==='RSAFS')return'$'+Math.round(v/1000)+'B';
  if(sid==='HOUST')return Math.round(v).toLocaleString()+'K';
  if(sid==='ICSA')return Math.round(v/1000).toLocaleString()+'K';
  if(sid==='BUSAPPWNSATOT')return Math.round(v/1000).toFixed(1)+'K';
  if(['UNRATE','MORTGAGE30US','DRCCLACBS','BAMLH0A0HYM2','BAMLC0A0CM','T10Y2Y'].includes(sid))return v.toFixed(2)+'%';
  return v.toFixed(1);
}

const FRED_LABELS = {
  ICSA:'Initial Jobless Claims',UNRATE:'Unemployment Rate',CPIAUCSL:'CPI Inflation',
  UMCSENT:'Consumer Sentiment',MORTGAGE30US:'30-Yr Mortgage',HOUST:'Housing Starts',
  RSAFS:'Retail Sales',DRCCLACBS:'CC Delinquency',BAMLH0A0HYM2:'HY Credit Spread',
  BAMLC0A0CM:'IG Credit Spread',T10Y2Y:'10Y-2Y Spread',BUSAPPWNSATOT:'Business Apps'
};

async function sbFetch(table,method='GET',body=null){
  const opts={method,headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=representation'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*&order=id`,opts);
  return r.ok?r.json():[];
}
async function sbInsert(table,data){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=representation'},body:JSON.stringify(data)});
  return r.json();
}
async function sbDelete(table,id){
  await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`,{method:'DELETE',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
}

/* ════════════════════════════════════════
   TWELVE DATA — live prices
════════════════════════════════════════ */
async function fetchPrices(tickers){
  if(!tickers.length)return{};
  try{
    const r=await fetch(`https://api.twelvedata.com/price?symbol=${tickers.join(',')}&apikey=${TD_KEY}`);
    const d=await r.json();
    // Twelve Data returns {symbol:{price}} for multi or {price} for single
    if(tickers.length===1){return{[tickers[0]]:parseFloat(d.price||0)};}
    const out={};
    Object.entries(d).forEach(([k,v])=>{out[k]=parseFloat(v.price||0);});
    return out;
  }catch{return{};}
}

async function fetchQuote(ticker){
  try{
    const r=await fetch(`https://api.twelvedata.com/quote?symbol=${ticker}&apikey=${TD_KEY}`);
    const d=await r.json();
    return{price:parseFloat(d.close||0),change:parseFloat(d.change||0),pct:parseFloat(d.percent_change||0),name:d.name||ticker};
  }catch{return null;}
}

function buildFredStrip(fred,containerId){
  const strip=document.getElementById(containerId);
  if(!strip)return;
  FRED_ORDER.forEach(sid=>{
    const s=fred[sid];if(!s)return;
    const dir=s.trend_direction;
    const cdir=FRED_BAD_UP.has(sid)?(dir==='up'?'down':dir==='down'?'up':dir):dir;
    const sign=s.pct_change>0?'+':'';
    const latestDate=s.dates?.length?fmt(s.dates[s.dates.length-1]):'';
    strip.insertAdjacentHTML('beforeend',`
      <div class="fcard">
        <div class="fcard-label">${s.label||FRED_LABELS[sid]||sid}</div>
        <div class="fcard-val ${cdir}">${fmtFredVal(sid,s.latest)}</div>
        <div class="fcard-sub ${cdir}">${sign}${s.pct_change}% vs prev</div>
        ${latestDate?`<div class="fcard-date">As of ${latestDate}</div>`:''}
      </div>`);
  });
}

function buildMacroGroups(fred){
  const container=document.getElementById('macro-groups');
  Object.entries(MACRO_GROUPS).forEach(([groupName,sids])=>{
    const groupEl=document.createElement('div');
    groupEl.className='macro-group';
    groupEl.innerHTML=`<div class="macro-group-title">${groupName}</div><div class="macro-grid" id="mg-${groupName.replace(/\W/g,'_')}"></div>`;
    container.appendChild(groupEl);
    const grid=document.getElementById('mg-'+groupName.replace(/\W/g,'_'));
    sids.forEach(sid=>{
      const s=fred[sid];if(!s)return;
      const dir=s.trend_direction;
      const cdir=FRED_BAD_UP.has(sid)?(dir==='up'?'down':dir==='down'?'up':dir):dir;
      const sign=s.pct_change>0?'+':'';
      const latestDate=s.dates?.length?fmt(s.dates[s.dates.length-1]):'';
      const cid='spark-'+sid;
      const card=document.createElement('div');
      card.className='mcard';
      card.innerHTML=`
        <div class="mcard-label">${s.label||FRED_LABELS[sid]||sid}</div>
        <div class="mcard-val ${cdir}">${fmtFredVal(sid,s.latest)}</div>
        <div class="mcard-sub ${cdir}">${sign}${s.pct_change}% vs prev</div>
        ${latestDate?`<div class="mcard-date">As of ${latestDate}</div>`:''}
        <div class="mcard-spark"><canvas id="${cid}"></canvas></div>`;
      grid.appendChild(card);

      requestAnimationFrame(()=>{
        const ctx=document.getElementById(cid);if(!ctx)return;

function buildPanels(cats){

function redrawAllCharts(){
  if(!MACRO_DATA)return;
  const cats=MACRO_DATA.categories;
  CAT_ORDER.forEach(k=>{
    const c=cats[k],color=c.color;
    const allTerms=Object.values(c.terms);
    const baseDates=allTerms[0]?.dates||[];
    const avgVals=baseDates.map((_,i)=>Math.round(allTerms.reduce((s,t)=>s+(t.values[i]||0),0)/allTerms.length));
    const filtered=filterTF(baseDates,avgVals,activeTF);
    const thinned=thin(filtered.dates,filtered.vals);
    const latestDate=thinned.dates.length?fmt(thinned.dates[thinned.dates.length-1]):'';
    const ltag=document.getElementById('ltag-'+k);
    if(ltag)ltag.textContent=latestDate?'Latest data: '+latestDate:'';
    requestAnimationFrame(()=>{
      const ctx=document.getElementById('mc-'+k);if(!ctx)return;
      if(mainCharts[k])mainCharts[k].destroy();
      mainCharts[k]=new Chart(ctx,{type:'line',data:{labels:thinned.dates.map(fmtShort),datasets:[{data:thinned.vals,borderColor:color,backgroundColor:rgba(color,.07),fill:true,borderWidth:2,pointRadius:0,tension:.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#14141e',borderColor:color,borderWidth:1,titleColor:'#e8e8f2',bodyColor:color,callbacks:{label:i=>' Score: '+i.raw}}},scales:{x:{grid:{color:'#1e1e2e'},ticks:{color:'#5a5a7a',maxTicksLimit:8,font:{size:10}}},y:{min:0,max:100,grid:{color:'#1e1e2e'},ticks:{color:'#5a5a7a',font:{size:10}}}}}});
    });
    Object.entries(c.terms).forEach(([term,td])=>{
      const tid='mc-'+k+'-'+term.replace(/\W/g,'_');
      const mf=filterTF(td.dates,td.values,activeTF);
      const mt=thin(mf.dates,mf.vals,45);
      requestAnimationFrame(()=>{
        const mc=document.getElementById(tid);if(!mc)return;
        if(miniCharts[tid])miniCharts[tid].destroy();
        miniCharts[tid]=new Chart(mc,{type:'line',data:{labels:mt.dates,datasets:[{data:mt.vals,borderColor:color,backgroundColor:rgba(color,.06),fill:true,borderWidth:1.5,pointRadius:0,tension:.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false,min:0,max:100}},animation:{duration:300}}});
      });
    });
  });
}

function switchCat(k){
  activeCat=k;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===k));
  document.querySelectorAll('.icard').forEach(c=>c.classList.toggle('active',c.dataset.cat===k));

async function loadWatchlist(){
  const container=document.getElementById('wl-content');
  container.innerHTML='<div style="color:var(--muted);padding:20px;font-size:12px">Loading...</div>';
  const rows=await sbFetch('watchlist');
  if(!rows.length){
    container.innerHTML=`<div class="empty-state"><div class="es-icon">◎</div><div class="es-text">No tickers yet. Add your first one.</div></div>`;
    return;
  }
  // Fetch live prices
  const tickers=rows.map(r=>r.ticker);
  const prices=await fetchPrices(tickers);
  container.innerHTML='';
  const table=document.createElement('table');
  table.className='wl-table';
  table.innerHTML=`<thead><tr>
    <th>Ticker</th><th>Price</th><th>Change</th><th>Target</th><th>Thesis</th><th>Tags</th><th>Added</th><th></th>
  </tr></thead>`;
  const tbody=document.createElement('tbody');
  rows.forEach(row=>{
    const price=prices[row.ticker]||0;
    const target=row.target_price||0;
    const upside=target&&price?((target-price)/price*100).toFixed(1):null;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><div class="ticker-badge">${row.ticker}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${row.name||''}</div></td>
      <td><div class="price-val">${price?'$'+price.toFixed(2):'—'}</div></td>
      <td><span class="price-val" style="color:var(--muted2)">—</span></td>
      <td>${target?`<div style="font-family:'JetBrains Mono',monospace;font-size:12px">$${target}</div>${upside?`<div style="font-size:9px;color:${upside>0?'var(--up)':'var(--down)'}">${upside>0?'+':''}${upside}% upside</div>`:''}`:'—'}</td>
      <td><div class="thesis-text">${row.thesis||'—'}</div></td>
      <td>${(row.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</td>
      <td style="font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace">${row.added_date||''}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteWatchlist('${row.id}')">✕</button></td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  container.appendChild(table);
}

async function saveWatchlist(){
  const ticker=document.getElementById('wl-ticker').value.trim().toUpperCase();
  if(!ticker)return;
  const tags=document.getElementById('wl-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  await sbInsert('watchlist',{
    ticker,
    name:document.getElementById('wl-name').value.trim(),
    thesis:document.getElementById('wl-thesis').value.trim(),
    target_price:parseFloat(document.getElementById('wl-target').value)||null,
    tags,added_date:new Date().toISOString().split('T')[0]
  });
  closeModal('watchlist');
  document.getElementById('wl-ticker').value='';
  document.getElementById('wl-name').value='';
  document.getElementById('wl-thesis').value='';
  document.getElementById('wl-target').value='';
  document.getElementById('wl-tags').value='';
  loadWatchlist();
}

async function deleteWatchlist(id){
  if(!confirm('Remove from watchlist?'))return;
  await sbDelete('watchlist',id);

}

async function loadPortfolio(){
  const container=document.getElementById('port-content');
  const summary=document.getElementById('port-summary');
  container.innerHTML='<div style="color:var(--muted);padding:20px;font-size:12px">Loading...</div>';
  summary.innerHTML='';
  const rows=await sbFetch('portfolio');
  if(!rows.length){
    container.innerHTML=`<div class="empty-state"><div class="es-icon">◎</div><div class="es-text">No positions yet. Add your first one.</div></div>`;
    buildPortSummary([],{});return;
  }
  const tickers=[...new Set(rows.map(r=>r.ticker))];
  const prices=await fetchPrices(tickers);
  buildPortSummary(rows,prices);
  container.innerHTML='';
  const table=document.createElement('table');
  table.className='wl-table';
  table.innerHTML=`<thead><tr>
    <th>Ticker</th><th>Shares</th><th>Cost Basis</th><th>Current Price</th><th>Market Value</th><th>P&L</th><th>P&L %</th><th>Notes</th><th></th>
  </tr></thead>`;
  const tbody=document.createElement('tbody');
  rows.forEach(row=>{
    const price=prices[row.ticker]||0;
    const cost=row.cost_basis||0;
    const shares=row.shares||0;
    const mv=price*shares;
    const pl=mv-(cost*shares);
    const plPct=cost?((price-cost)/cost*100):0;
    const plClass=pl>=0?'chg-up':'chg-down';
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><div class="ticker-badge">${row.ticker}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${row.name||''}</div></td>
      <td style="font-family:'JetBrains Mono',monospace">${shares.toLocaleString()}</td>
      <td style="font-family:'JetBrains Mono',monospace">$${cost.toFixed(2)}</td>
      <td style="font-family:'JetBrains Mono',monospace">${price?'$'+price.toFixed(2):'—'}</td>
      <td style="font-family:'JetBrains Mono',monospace">${mv?'$'+mv.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}):'—'}</td>
      <td><span class="${plClass}">${pl>=0?'+':''} $${Math.abs(pl).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span></td>
      <td><span class="${plClass}">${plPct>=0?'+':''}${plPct.toFixed(2)}%</span></td>
      <td><div class="thesis-text">${row.notes||'—'}</div></td>
      <td><button class="btn btn-danger btn-sm" onclick="deletePortfolio('${row.id}')">✕</button></td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  container.appendChild(table);
}

function buildPortSummary(rows,prices){
  const summary=document.getElementById('port-summary');
  let totalCost=0,totalMV=0;
  rows.forEach(r=>{
    const p=prices[r.ticker]||0;
    totalCost+=(r.cost_basis||0)*(r.shares||0);
    totalMV+=p*(r.shares||0);
  });
  const pl=totalMV-totalCost;
  const plPct=totalCost?(pl/totalCost*100):0;
  summary.innerHTML=`
    <div class="psum-card"><div class="psum-label">Total Value</div><div class="psum-val">${totalMV?'$'+totalMV.toLocaleString(undefined,{maximumFractionDigits:0}):'—'}</div></div>
    <div class="psum-card"><div class="psum-label">Total Cost</div><div class="psum-val">${totalCost?'$'+totalCost.toLocaleString(undefined,{maximumFractionDigits:0}):'—'}</div></div>
    <div class="psum-card"><div class="psum-label">Total P&L</div><div class="psum-val ${pl>=0?'up':'down'}">${pl>=0?'+':'-'}$${Math.abs(pl).toLocaleString(undefined,{maximumFractionDigits:0})}</div></div>
    <div class="psum-card"><div class="psum-label">Return</div><div class="psum-val ${plPct>=0?'up':'down'}">${plPct>=0?'+':''}${plPct.toFixed(2)}%</div></div>`;
}

async function savePortfolio(){
  const ticker=document.getElementById('pt-ticker').value.trim().toUpperCase();
  if(!ticker)return;
  await sbInsert('portfolio',{
    ticker,
    name:document.getElementById('pt-name').value.trim(),
    shares:parseFloat(document.getElementById('pt-shares').value)||0,
    cost_basis:parseFloat(document.getElementById('pt-cost').value)||0,
    open_date:document.getElementById('pt-date').value||null,

  });

async function deletePortfolio(id){
  if(!confirm('Remove position?'))return;
  await sbDelete('portfolio',id);

}

    buildIndex(d.categories);
    buildPanels(d.categories);
  })
  .catch(()=>{
    document.getElementById('macro-groups').innerHTML='<div style="padding:60px;text-align:center;color:var(--muted)">⟳ Loading data...</div>';
  });
</script>
</body>
</html>
