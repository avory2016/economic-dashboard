<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Economic Signal Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#0f0f17;--bg3:#14141e;--bg4:#1a1a26;
  --border:#1e1e2e;--border2:#252538;
  --accent:#00CC99;
  --text:#e8e8f2;--muted:#5a5a7a;--muted2:#8888aa;
  --up:#00CC99;--down:#ff4d6d;--flat:#6666aa;
  --c-jobs:#00CC99;--c-consumer:#4da6ff;--c-stress:#ff7b54;--c-sentiment:#c77dff;--c-housing:#f9c74f;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.hlogo{display:flex;align-items:center;gap:10px}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--accent)}50%{opacity:.4;box-shadow:0 0 22px var(--accent)}}
h1{font-size:14px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
.htag{font-size:11px;color:var(--muted2);font-family:'JetBrains Mono',monospace;margin-top:1px}
.hright{display:flex;align-items:center;gap:14px}
#ts{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2)}
.btn{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:6px 16px;border-radius:3px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn:hover{background:var(--accent);color:#000}
.btn:disabled{opacity:.35;pointer-events:none}
#prog{position:fixed;top:0;left:0;height:2px;width:0;background:var(--accent);z-index:9999;transition:width .4s}
main{padding:24px 32px;max-width:1600px;margin:0 auto}

.fred-strip{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:24px;scrollbar-width:none;}
.fred-strip::-webkit-scrollbar{display:none}
.fcard{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px 16px;min-width:150px;flex-shrink:0;}
.fcard-label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.fcard-val{font-size:18px;font-weight:700;line-height:1;font-family:'JetBrains Mono',monospace}
.fcard-val.up{color:var(--up)}.fcard-val.down{color:var(--down)}.fcard-val.flat{color:var(--muted2)}
.fcard-sub{font-size:10px;margin-top:3px;font-family:'JetBrains Mono',monospace}
.fcard-sub.up{color:var(--up)}.fcard-sub.down{color:var(--down)}.fcard-sub.flat{color:var(--muted2)}
.fcard-date{font-size:9px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace}

.index-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.icard{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:16px 18px;cursor:pointer;transition:border-color .2s,background .2s;}
.icard:hover,.icard.active{background:var(--bg3)}
.icard[data-cat=jobs].active{border-color:var(--c-jobs)}
.icard[data-cat=consumer_spending].active{border-color:var(--c-consumer)}
.icard[data-cat=financial_stress].active{border-color:var(--c-stress)}
.icard[data-cat=economic_sentiment].active{border-color:var(--c-sentiment)}
.icard[data-cat=housing].active{border-color:var(--c-housing)}
.icard-label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.icard-score{font-size:30px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace}
.icard[data-cat=jobs] .icard-score{color:var(--c-jobs)}
.icard[data-cat=consumer_spending] .icard-score{color:var(--c-consumer)}
.icard[data-cat=financial_stress] .icard-score{color:var(--c-stress)}
.icard[data-cat=economic_sentiment] .icard-score{color:var(--c-sentiment)}
.icard[data-cat=housing] .icard-score{color:var(--c-housing)}
.icard-sub{font-size:10px;color:var(--muted);margin-top:4px}

.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;padding:10px 22px;color:var(--muted2);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-bottom:-1px;transition:all .2s;}
.tab:hover{color:var(--text)}
.tab[data-cat=jobs].active{border-color:var(--c-jobs);color:var(--c-jobs)}
.tab[data-cat=consumer_spending].active{border-color:var(--c-consumer);color:var(--c-consumer)}
.tab[data-cat=financial_stress].active{border-color:var(--c-stress);color:var(--c-stress)}
.tab[data-cat=economic_sentiment].active{border-color:var(--c-sentiment);color:var(--c-sentiment)}
.tab[data-cat=housing].active{border-color:var(--c-housing);color:var(--c-housing)}

.panel{display:none}.panel.active{display:block}

.tf-row{display:flex;align-items:center;gap:4px;margin-bottom:14px;flex-wrap:wrap;}
.tf-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-right:4px}
.tf-btn{background:transparent;border:1px solid var(--border2);color:var(--muted2);padding:4px 10px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;}
.tf-btn:hover{border-color:var(--muted2);color:var(--text)}
.tf-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,204,153,.08)}
.latest-lbl{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-left:auto}

.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:22px 24px;margin-bottom:16px;}
.box-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.box-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2)}
.box-title span{color:var(--text);font-size:14px;text-transform:none;letter-spacing:0;margin-left:8px}
.chart-h{position:relative;height:220px}

.term-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:16px 18px;}
.tcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.tcard-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.tcard-date{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px}
.badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.badge.up{background:rgba(0,204,153,.12);color:var(--up)}
.badge.down{background:rgba(255,77,109,.12);color:var(--down)}
.badge.flat{background:rgba(102,102,170,.12);color:var(--flat)}
.tcard-stats{display:flex;gap:18px;margin-bottom:10px}
.stat-val{font-size:22px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.mini-h{height:44px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:900px){
  main{padding:16px}header{padding:0 16px}
  .index-row{grid-template-columns:repeat(2,1fr)}
  .tabs{overflow-x:auto;scrollbar-width:none}
}
</style>
</head>
<body>
<div id="prog"></div>
<header>
  <div class="hlogo">
    <div class="pulse-dot"></div>
    <div>
      <h1>Economic Signal Dashboard</h1>
      <div class="htag">Google Trends + FRED &nbsp;·&nbsp; US &nbsp;·&nbsp; Daily</div>
    </div>
  </div>
  <div class="hright">
    <span id="ts"></span>
    <button class="btn" id="refresh-btn" onclick="onRefresh()">↻ Refresh</button>
  </div>
</header>
<main>
  <div class="fred-strip" id="fred-strip"></div>
  <div class="index-row" id="index-row"></div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</main>
<script>
const CAT_ORDER  = ['jobs','consumer_spending','financial_stress','economic_sentiment','housing'];
const FRED_ORDER = ['ICSA','UNRATE','CPIAUCSL','UMCSENT','MORTGAGE30US','HOUST','RSAFS','DRCCLACBS'];
const FRED_BAD_UP = new Set(['ICSA','UNRATE','CPIAUCSL','DRCCLACBS']);
const TF_OPTIONS = [
  {key:'30d', label:'30D', days:30},
  {key:'90d', label:'90D', days:90},
  {key:'1y',  label:'1Y',  days:365},
  {key:'3y',  label:'3Y',  days:1095},
  {key:'5y',  label:'5Y',  days:1825},
  {key:'10y', label:'10Y', days:3650},
  {key:'max', label:'MAX', days:99999},
];

let DATA = null, activeCat = 'jobs', activeTF = '90d';
const miniCharts = {}, mainCharts = {};

/* ── date helpers ── */
function parseDate(s) {
  if (!s) return null;
  s = String(s).trim();
  // "Dec 29, 2024 – Jan 4, 2025" → take first part
  if (s.includes('–')) s = s.split('–')[0].trim();
  // YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return new Date(s + 'T00:00:00');
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}
function fmt(s) {
  const d = parseDate(s);
  if (!d) return '';
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}
function fmtShort(s) {
  const d = parseDate(s);
  if (!d) return '';
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

/* ── filter by timeframe ── */
function filterTF(dates, vals, tfKey) {
  const tf = TF_OPTIONS.find(t => t.key === tfKey);
  if (!tf || tf.days >= 99999) return {dates, vals};
  const cutoff = new Date(Date.now() - tf.days * 86400000);
  const od = [], ov = [];
  dates.forEach((d, i) => {
    const pd = parseDate(d);
    if (pd && pd >= cutoff) { od.push(d); ov.push(vals[i]); }
  });
  return od.length >= 3 ? {dates:od, vals:ov} : {dates, vals};
}

/* ── thin series for chart ── */
function thin(dates, vals, n=80) {
  if (dates.length <= n) return {dates, vals};
  const step = Math.ceil(dates.length / n), od=[], ov=[];
  for (let i=0; i<dates.length; i+=step){od.push(dates[i]);ov.push(vals[i]);}
  return {dates:od, vals:ov};
}

function rgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function fmtFredVal(sid, v) {
  if (sid==='RSAFS')  return '$'+Math.round(v/1000)+'B';
  if (sid==='HOUST')  return Math.round(v).toLocaleString()+'K';
  if (sid==='ICSA')   return Math.round(v/1000).toLocaleString()+'K';
  if (['UNRATE','MORTGAGE30US','DRCCLACBS'].includes(sid)) return v.toFixed(1)+'%';
  return v.toFixed(1);
}

/* ── FRED strip ── */
function buildFred(fred) {
  const strip = document.getElementById('fred-strip');
  FRED_ORDER.forEach(sid => {
    const s = fred[sid]; if (!s) return;
    const dir = s.trend_direction;
    const cdir = FRED_BAD_UP.has(sid) ? (dir==='up'?'down':dir==='down'?'up':dir) : dir;
    const sign = s.pct_change > 0 ? '+' : '';
    const latestDate = s.dates?.length ? fmt(s.dates[s.dates.length-1]) : '';
    strip.insertAdjacentHTML('beforeend', `
      <div class="fcard">
        <div class="fcard-label">${s.label}</div>
        <div class="fcard-val ${cdir}">${fmtFredVal(sid, s.latest)}</div>
        <div class="fcard-sub ${cdir}">${sign}${s.pct_change}% vs prev</div>
        ${latestDate ? `<div class="fcard-date">As of ${latestDate}</div>` : ''}
      </div>`);
  });
}

/* ── index cards + tabs ── */
function buildIndex(cats) {
  const row = document.getElementById('index-row');
  const tabs = document.getElementById('tabs');
  CAT_ORDER.forEach(k => {
    const c = cats[k];
    row.insertAdjacentHTML('beforeend', `
      <div class="icard${k===activeCat?' active':''}" data-cat="${k}" onclick="switchCat('${k}')">
        <div class="icard-label">${c.label}</div>
        <div class="icard-score">${c.index}</div>
        <div class="icard-sub">Search Index · 0–100</div>
      </div>`);
    tabs.insertAdjacentHTML('beforeend', `
      <button class="tab${k===activeCat?' active':''}" data-cat="${k}" onclick="switchCat('${k}')">${c.label}</button>`);
  });
}

/* ── panels ── */
function buildPanels(cats) {
  const container = document.getElementById('panels');
  CAT_ORDER.forEach(k => {
    const c = cats[k], color = c.color;
    const allTerms = Object.values(c.terms);
    const baseDates = allTerms[0]?.dates || [];
    const avgVals = baseDates.map((_,i) =>
      Math.round(allTerms.reduce((s,t) => s + (t.values[i]||0), 0) / allTerms.length));

    const panelEl = document.createElement('div');
    panelEl.className = 'panel' + (k===activeCat?' active':'');
    panelEl.id = 'panel-' + k;

    // TF row
    const tfRowEl = document.createElement('div');
    tfRowEl.className = 'tf-row';
    tfRowEl.innerHTML = `<span class="tf-lbl">Timeframe:</span>` +
      TF_OPTIONS.map(tf =>
        `<button class="tf-btn${tf.key===activeTF?' active':''}" data-tf="${tf.key}">${tf.label}</button>`
      ).join('') +
      `<span class="latest-lbl" id="ltag-${k}" style="margin-left:auto"></span>`;

    // Chart box
    const chartBox = document.createElement('div');
    chartBox.className = 'chart-box';
    chartBox.innerHTML = `
      <div class="box-header">
        <div class="box-title">Composite Index<span>${c.label}</span></div>
      </div>
      <div class="chart-h"><canvas id="mc-${k}"></canvas></div>`;

    // Term grid
    const termGrid = document.createElement('div');
    termGrid.className = 'term-grid';
    termGrid.id = 'tg-' + k;

    panelEl.appendChild(tfRowEl);
    panelEl.appendChild(chartBox);
    panelEl.appendChild(termGrid);
    container.appendChild(panelEl);

    // TF button click handler
    tfRowEl.querySelectorAll('.tf-btn').forEach(btn => {
      btn.onclick = () => {
        activeTF = btn.dataset.tf;
        // Update all TF buttons across all panels
        document.querySelectorAll('.tf-btn').forEach(b =>
          b.classList.toggle('active', b.dataset.tf === activeTF));
        redrawAllCharts();
      };
    });

    // Build term cards
    Object.entries(c.terms).forEach(([term, td]) => {
      const arrow = {up:'↑', down:'↓', flat:'→'}[td.trend_direction] || '→';
      const tid = 'mc-' + k + '-' + term.replace(/\W/g,'_');
      const latestTermDate = td.dates?.length ? fmt(td.dates[td.dates.length-1]) : '';
      const card = document.createElement('div');
      card.className = 'tcard';
      card.innerHTML = `
        <div class="tcard-top">
          <div>
            <div class="tcard-name">${term}</div>
            ${latestTermDate ? `<div class="tcard-date">Latest: ${latestTermDate}</div>` : ''}
          </div>
          <span class="badge ${td.trend_direction}">${arrow} ${td.trend_direction}</span>
        </div>
        <div class="tcard-stats">
          <div><div class="stat-val" style="color:${color}">${td.normalized_latest}</div><div class="stat-lbl">Latest</div></div>
          <div><div class="stat-val">${td.avg_30d}</div><div class="stat-lbl">30d Avg</div></div>
          <div><div class="stat-val">${td.avg_90d}</div><div class="stat-lbl">90d Avg</div></div>
        </div>
        <div class="mini-h"><canvas id="${tid}"></canvas></div>`;
      termGrid.appendChild(card);
    });
  });

  // Initial draw
  redrawAllCharts();
}

function redrawAllCharts() {
  CAT_ORDER.forEach(k => {
    const c = DATA.categories[k], color = c.color;
    const allTerms = Object.values(c.terms);
    const baseDates = allTerms[0]?.dates || [];
    const avgVals = baseDates.map((_,i) =>
      Math.round(allTerms.reduce((s,t) => s+(t.values[i]||0),0)/allTerms.length));

    // Main chart
    const filtered = filterTF(baseDates, avgVals, activeTF);
    const thinned  = thin(filtered.dates, filtered.vals);
    const latestDate = thinned.dates.length ? fmt(thinned.dates[thinned.dates.length-1]) : '';
    const ltag = document.getElementById('ltag-'+k);
    if (ltag) ltag.textContent = latestDate ? 'Latest data: ' + latestDate : '';

    requestAnimationFrame(() => {
      const ctx = document.getElementById('mc-'+k); if(!ctx) return;
      if (mainCharts[k]) mainCharts[k].destroy();
      mainCharts[k] = new Chart(ctx, {type:'line', data:{
        labels: thinned.dates.map(fmtShort),
        datasets:[{data:thinned.vals, borderColor:color, backgroundColor:rgba(color,.07),
          fill:true, borderWidth:2, pointRadius:0, tension:.4}]
      }, options:{responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{backgroundColor:'#14141e',
          borderColor:color, borderWidth:1, titleColor:'#e8e8f2', bodyColor:color,
          callbacks:{label:i=>' Score: '+i.raw}}},
        scales:{
          x:{grid:{color:'#1e1e2e'}, ticks:{color:'#5a5a7a', maxTicksLimit:8, font:{size:10}}},
          y:{min:0, max:100, grid:{color:'#1e1e2e'}, ticks:{color:'#5a5a7a', font:{size:10}}}
        }
      }});
    });

    // Mini charts
    Object.entries(c.terms).forEach(([term, td]) => {
      const tid = 'mc-' + k + '-' + term.replace(/\W/g,'_');
      const mf  = filterTF(td.dates, td.values, activeTF);
      const mt  = thin(mf.dates, mf.vals, 45);
      requestAnimationFrame(() => {
        const mc = document.getElementById(tid); if(!mc) return;
        if (miniCharts[tid]) miniCharts[tid].destroy();
        miniCharts[tid] = new Chart(mc, {type:'line', data:{
          labels: mt.dates,
          datasets:[{data:mt.vals, borderColor:color, backgroundColor:rgba(color,.06),
            fill:true, borderWidth:1.5, pointRadius:0, tension:.4}]
        }, options:{responsive:true, maintainAspectRatio:false,
          plugins:{legend:{display:false}, tooltip:{enabled:false}},
          scales:{x:{display:false}, y:{display:false, min:0, max:100}},
          animation:{duration:300}}});
      });
    });
  });
}

function switchCat(k) {
  activeCat = k;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat===k));
  document.querySelectorAll('.icard').forEach(c => c.classList.toggle('active', c.dataset.cat===k));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id==='panel-'+k));
}

function setTimestamp(ts) {
  const d = new Date(ts);
  document.getElementById('ts').textContent =
    'Updated ' + d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) +
    ' · ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function onRefresh() {
  const btn = document.getElementById('refresh-btn');
  const bar = document.getElementById('prog');
  btn.disabled = true; btn.textContent = '⟳ Fetching…';
  bar.style.width = '0%';
  let p = 0;
  const iv = setInterval(()=>{p+=Math.random()*12;if(p>=90){clearInterval(iv);p=90;}bar.style.width=p+'%';},300);
  fetch('./data/trends_data.json?t='+Date.now())
    .then(r=>r.json()).then(d=>{
      clearInterval(iv); bar.style.width='100%';
      setTimeout(()=>bar.style.width='0',500);
      btn.disabled=false; btn.textContent='↻ Refresh';
      DATA=d; init(d);
    }).catch(()=>{
      clearInterval(iv); bar.style.width='0';
      btn.disabled=false; btn.textContent='↻ Refresh';
    });
}

function init(data) {
  DATA = data;
  setTimestamp(data.last_updated);
  document.getElementById('fred-strip').innerHTML='';
  document.getElementById('index-row').innerHTML='';
  document.getElementById('tabs').innerHTML='';
  document.getElementById('panels').innerHTML='';
  buildFred(data.fred||{});
  buildIndex(data.categories);
  buildPanels(data.categories);
}

fetch('./data/trends_data.json?t='+Date.now())
  .then(r=>{if(!r.ok)throw new Error();return r.json();})
  .then(d=>init(d))
  .catch(()=>{
    document.querySelector('main').innerHTML='<div style="padding:60px;text-align:center;color:#5a5a7a"><div style="font-size:32px;margin-bottom:16px">⟳</div><div>Loading data...</div></div>';
  });
</script>
</body>
</html>
