<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Economic Signal Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#0f0f17;--bg3:#14141e;--bg4:#1a1a26;
  --border:#1e1e2e;--border2:#252538;
  --accent:#00CC99;--accent-glow:rgba(0,204,153,0.15);
  --text:#e8e8f2;--muted:#5a5a7a;--muted2:#8888aa;
  --up:#00CC99;--down:#ff4d6d;--flat:#6666aa;
  --c-jobs:#00CC99;--c-consumer:#4da6ff;--c-stress:#ff7b54;--c-sentiment:#c77dff;--c-housing:#f9c74f;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* HEADER */
header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.hlogo{display:flex;align-items:center;gap:10px}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 12px var(--accent);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--accent)}50%{opacity:.4;box-shadow:0 0 22px var(--accent)}}
h1{font-size:14px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text)}
.htag{font-size:11px;color:var(--muted2);font-family:'JetBrains Mono',monospace;margin-top:1px}
.hright{display:flex;align-items:center;gap:14px}
#ts{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2)}
.btn{background:transparent;border:1px solid var(--accent);color:var(--accent);
  padding:6px 16px;border-radius:3px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:.06em;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn:hover{background:var(--accent);color:#000}
.btn:disabled{opacity:.35;pointer-events:none}

/* PROGRESS */
#prog{position:fixed;top:0;left:0;height:2px;width:0;background:var(--accent);z-index:9999;transition:width .4s}

/* MAIN */
main{padding:24px 32px;max-width:1600px;margin:0 auto}

/* FRED STRIP */
.fred-strip{
  display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:24px;
  scrollbar-width:none;
}
.fred-strip::-webkit-scrollbar{display:none}
.fcard{
  background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:12px 16px;min-width:150px;flex-shrink:0;
}
.fcard-label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.fcard-val{font-size:18px;font-weight:700;line-height:1;font-family:'JetBrains Mono',monospace}
.fcard-val.up{color:var(--up)}
.fcard-val.down{color:var(--down)}
.fcard-val.flat{color:var(--muted2)}
.fcard-sub{font-size:10px;margin-top:3px;font-family:'JetBrains Mono',monospace}
.fcard-sub.up{color:var(--up)}
.fcard-sub.down{color:var(--down)}
.fcard-sub.flat{color:var(--muted2)}

/* INDEX CARDS */
.index-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.icard{
  background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:16px 18px;cursor:pointer;transition:border-color .2s,background .2s;
}
.icard:hover{background:var(--bg3)}
.icard.active{background:var(--bg3)}
.icard[data-cat=jobs].active{border-color:var(--c-jobs)}
.icard[data-cat=consumer_spending].active{border-color:var(--c-consumer)}
.icard[data-cat=financial_stress].active{border-color:var(--c-stress)}
.icard[data-cat=economic_sentiment].active{border-color:var(--c-sentiment)}
.icard[data-cat=housing].active{border-color:var(--c-housing)}
.icard-label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.icard-score{font-size:30px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace}
.icard[data-cat=jobs] .icard-score{color:var(--c-jobs)}
.icard[data-cat=consumer_spending] .icard-score{color:var(--c-consumer)}
.icard[data-cat=financial_stress] .icard-score{color:var(--c-stress)}
.icard[data-cat=economic_sentiment] .icard-score{color:var(--c-sentiment)}
.icard[data-cat=housing] .icard-score{color:var(--c-housing)}
.icard-sub{font-size:10px;color:var(--muted);margin-top:4px}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{
  background:transparent;border:none;border-bottom:2px solid transparent;
  padding:10px 22px;color:var(--muted2);font-family:'Syne',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;margin-bottom:-1px;transition:all .2s;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text)}
.tab[data-cat=jobs].active{border-color:var(--c-jobs);color:var(--c-jobs)}
.tab[data-cat=consumer_spending].active{border-color:var(--c-consumer);color:var(--c-consumer)}
.tab[data-cat=financial_stress].active{border-color:var(--c-stress);color:var(--c-stress)}
.tab[data-cat=economic_sentiment].active{border-color:var(--c-sentiment);color:var(--c-sentiment)}
.tab[data-cat=housing].active{border-color:var(--c-housing);color:var(--c-housing)}

/* PANELS */
.panel{display:none}.panel.active{display:block}

/* CHART BOX */
.chart-box{
  background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:22px 24px;margin-bottom:16px;
}
.box-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;
}
.box-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2)}
.box-title span{color:var(--text);font-size:14px;text-transform:none;letter-spacing:0;margin-left:8px}
.chart-h{position:relative;height:220px}

/* TERM GRID */
.term-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.tcard{
  background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:16px 18px;transition:border-color .2s;
}
.tcard:hover{border-color:var(--border2)}
.tcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.tcard-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.badge.up{background:rgba(0,204,153,.12);color:var(--up)}
.badge.down{background:rgba(255,77,109,.12);color:var(--down)}
.badge.flat{background:rgba(102,102,170,.12);color:var(--flat)}
.tcard-stats{display:flex;gap:18px;margin-bottom:10px}
.stat-val{font-size:22px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.mini-h{height:44px}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:900px){
  main{padding:16px}header{padding:0 16px}
  .index-row{grid-template-columns:repeat(2,1fr)}
  .tabs{overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
}
</style>
</head>
<body>
<div id="prog"></div>
<header>
  <div class="hlogo">
    <div class="pulse-dot"></div>
    <div>
      <h1>Economic Signal Dashboard</h1>
      <div class="htag">Google Trends + FRED &nbsp;·&nbsp; US &nbsp;·&nbsp; Daily</div>
    </div>
  </div>
  <div class="hright">
    <span id="ts"></span>
    <button class="btn" id="refresh-btn" onclick="onRefresh()">↻ Refresh</button>
  </div>
</header>

<main>
  <div class="fred-strip" id="fred-strip"></div>
  <div class="index-row" id="index-row"></div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</main>

// FRED: which direction is "bad" (for coloring — up in jobless claims is bad)
const FRED_BAD_UP = new Set(['ICSA','UNRATE','CPIAUCSL','DRCCLACBS']);

let active = 'jobs';
const miniCharts = {}, mainCharts = {};

function rgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function fmtDate(s){const d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function ds(dates,vals,n=60){
  if(dates.length<=n)return{dates,vals};
  const st=Math.ceil(dates.length/n),d2=[],v2=[];
  for(let i=0;i<dates.length;i+=st){d2.push(dates[i]);v2.push(vals[i]);}
  return{dates:d2,vals:v2};
}
function fmtVal(sid, v){
  if(sid==='RSAFS') return '$'+Math.round(v/1000)+'B';
  if(sid==='HOUST') return Math.round(v).toLocaleString()+'K';
  if(sid==='ICSA')  return Math.round(v).toLocaleString()+'K';
  if(['UNRATE','MORTGAGE30US','DRCCLACBS'].includes(sid)) return v.toFixed(1)+'%';
  return v.toFixed(1);
}

function buildFred(fred){
  const strip = document.getElementById('fred-strip');
  FRED_ORDER.forEach(sid => {
    const s = fred[sid]; if(!s) return;
    // For coloring: if bad_up series goes up → red; otherwise green
    let dir = s.trend_direction;
    let colorDir = dir;
    if(FRED_BAD_UP.has(sid)) colorDir = dir==='up'?'down':dir==='down'?'up':dir;
    const sign = s.pct_change > 0 ? '+' : '';
    const card = document.createElement('div');
    card.className = 'fcard';
    card.innerHTML = `
      <div class="fcard-label">${s.label}</div>
      <div class="fcard-val ${colorDir}">${fmtVal(sid, s.latest)}</div>
      <div class="fcard-sub ${colorDir}">${sign}${s.pct_change}% vs prev</div>`;
    strip.appendChild(card);
  });
}

  const tabs = document.getElementById('tabs');
  CAT_ORDER.forEach(k=>{
    const c=cats[k];
    const ic=document.createElement('div');
    ic.className='icard'+(k===active?' active':'');
    ic.dataset.cat=k;ic.onclick=()=>switchCat(k);
    ic.innerHTML=`<div class="icard-label">${c.label}</div>
      <div class="icard-score">${c.index}</div>
      <div class="icard-sub">Search Index · 0–100</div>`;
    row.appendChild(ic);
    const tab=document.createElement('button');
    tab.className='tab'+(k===active?' active':'');
    tab.dataset.cat=k;tab.textContent=c.label;tab.onclick=()=>switchCat(k);
    tabs.appendChild(tab);
  });
}

function buildPanels(cats){
  const panels=document.getElementById('panels');
  CAT_ORDER.forEach(k=>{
    const c=cats[k];
    const color=c.color;
    const panel=document.createElement('div');
    panel.className='panel'+(k===active?' active':'');
    panel.id='panel-'+k;

    const allTerms=Object.values(c.terms);
    const dates=allTerms[0]?.dates||[];
    const avgVals=dates.map((_,i)=>Math.round(allTerms.reduce((s,t)=>s+t.values[i],0)/allTerms.length));
    const dsd=ds(dates,avgVals);

    panel.innerHTML=`
      <div class="chart-box">
        <div class="box-header">
          <div class="box-title">Composite Index<span>${c.label}</span></div>
        </div>
        <div class="chart-h"><canvas id="mc-${k}"></canvas></div>
      </div>
      <div class="term-grid" id="tg-${k}"></div>`;
    panels.appendChild(panel);

    requestAnimationFrame(()=>{
      const ctx=document.getElementById('mc-'+k);if(!ctx)return;
      if(mainCharts[k])mainCharts[k].destroy();
      mainCharts[k]=new Chart(ctx,{type:'line',data:{
        labels:dsd.dates.map(fmtDate),
        datasets:[{data:dsd.vals,borderColor:color,backgroundColor:rgba(color,.07),
          fill:true,borderWidth:2,pointRadius:0,tension:.4}]
      },options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#14141e',
          borderColor:color,borderWidth:1,titleColor:'#e8e8f2',bodyColor:color,
          callbacks:{label:i=>' Score: '+i.raw}}},
        scales:{
          x:{grid:{color:'#1e1e2e'},ticks:{color:'#5a5a7a',maxTicksLimit:10,font:{size:10}}},
          y:{min:0,max:100,grid:{color:'#1e1e2e'},ticks:{color:'#5a5a7a',font:{size:10}}}
        }
      }});
    });

    requestAnimationFrame(()=>{
      const grid=document.getElementById('tg-'+k);if(!grid)return;
      Object.entries(c.terms).forEach(([term,td])=>{
        const arrow={up:'↑',down:'↓',flat:'→'}[td.trend_direction];
        const tid='m-'+k+'-'+term.replace(/[^a-zA-Z0-9]/g,'_');
        const tc=document.createElement('div');tc.className='tcard';
        tc.innerHTML=`
          <div class="tcard-top">
            <div class="tcard-name">${term}</div>
            <span class="badge ${td.trend_direction}">${arrow} ${td.trend_direction}</span>
          </div>
          <div class="tcard-stats">
            <div><div class="stat-val" style="color:${color}">${td.normalized_latest}</div><div class="stat-lbl">Latest</div></div>
            <div><div class="stat-val">${td.avg_30d}</div><div class="stat-lbl">30d Avg</div></div>
            <div><div class="stat-val">${td.avg_90d}</div><div class="stat-lbl">90d Avg</div></div>
          </div>
          <div class="mini-h"><canvas id="${tid}"></canvas></div>`;
        grid.appendChild(tc);
        requestAnimationFrame(()=>{
          const mc=document.getElementById(tid);if(!mc)return;
          const mds=ds(td.dates,td.values,45);
          if(miniCharts[tid])miniCharts[tid].destroy();
          miniCharts[tid]=new Chart(mc,{type:'line',data:{
            labels:mds.dates,
            datasets:[{data:mds.vals,borderColor:color,backgroundColor:rgba(color,.06),
              fill:true,borderWidth:1.5,pointRadius:0,tension:.4}]
          },options:{responsive:true,maintainAspectRatio:false,
            plugins:{legend:{display:false},tooltip:{enabled:false}},
            scales:{x:{display:false},y:{display:false,min:0,max:100}},
            animation:{duration:300}}});
        });
      });
    });
  });
}

function switchCat(k){
  active=k;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===k));
  document.querySelectorAll('.icard').forEach(c=>c.classList.toggle('active',c.dataset.cat===k));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+k));
}

function setTimestamp(ts){
  const d=new Date(ts);
  document.getElementById('ts').textContent=
    'Updated '+d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+
    ' · '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function onRefresh(){
  const btn=document.getElementById('refresh-btn');
  const bar=document.getElementById('prog');
  btn.disabled=true;btn.textContent='⟳ Fetching…';
  bar.style.width='0%';
  let p=0;
  const iv=setInterval(()=>{p+=Math.random()*12;if(p>=90){clearInterval(iv);p=90;}bar.style.width=p+'%';},350);
  // In production: fetch('./data/trends_data.json?t='+Date.now()).then(r=>r.json()).then(init)
  setTimeout(()=>{
    clearInterval(iv);bar.style.width='100%';
    setTimeout(()=>bar.style.width='0',500);
    btn.disabled=false;btn.textContent='↻ Refresh';
  },2500);
}

function init(data){
  setTimestamp(data.last_updated);
  document.getElementById('fred-strip').innerHTML='';
  document.getElementById('index-row').innerHTML='';
  document.getElementById('tabs').innerHTML='';
  document.getElementById('panels').innerHTML='';
  buildFred(data.fred||{});
  buildIndex(data.categories);
  buildPanels(data.categories);
}

init(DATA);
</script>
</body>
</html>
